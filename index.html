<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Ryota Portfolio</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
      color: #333;
    }
    header {
      background: #222;
      color: white;
      padding: 20px;
      text-align: center;
    }
    .container {
      padding: 20px;
    }
    .works {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }
    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    img {
      width: 100%;
      border-radius: 8px;
    }
    a {
      color: #007acc;
    }
  </style>
</head>
<body>

<header>
  <h1>Ryotaのポートフォリオ(仮)</h1>
  <p>制作物まとめ</p>
</header>

<div class="container">
  <h2>作品</h2>

  <div class="works">
    
    <div class="card">
      <img src="https://via.placeholder.com/400x200">
      <h3>作品タイトル1</h3>
      <p>簡単な説明</p>
      <a href="#">リンク</a>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/400x200">
      <h3>作品タイトル2</h3>
      <p>簡単な説明</p>
      <a href="#">リンク</a>
    </div>

  </div>
</div>

</body>
</html>
